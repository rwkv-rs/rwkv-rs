name: Quality Gates (Docs)

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  docs-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            protobuf-compiler \
            libcap-ng-dev \
            libdrm-dev

      - name: Install mdBook
        uses: taiki-e/install-action@mdbook

      - name: Check workspace
        run: cargo check --workspace

      - name: Build rustdoc
        id: rustdoc
        run: |
          set -euo pipefail
          mkdir -p target/ci
          cargo doc --workspace --no-deps --message-format short 2>&1 \
            | tee target/ci/rustdoc.log

      - name: Summarize rustdoc missing_docs debt
        id: rustdoc_summary
        if: always()
        env:
          RUSTDOC_OUTCOME: ${{ steps.rustdoc.outcome }}
        run: bash scripts/ci/summarize_rustdoc_missing_docs.sh

      - name: Comment rustdoc missing_docs debt on pull request
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          RUSTDOC_STATUS: ${{ steps.rustdoc_summary.outputs.rustdoc_status }}
          SUMMARY_PATH: target/ci/missing-docs-summary.md
        with:
          script: |
            const path = require("path");
            const scriptPath = path.join(
              process.env.GITHUB_WORKSPACE,
              "scripts/ci/comment_rustdoc_missing_docs_debt.js",
            );
            await require(scriptPath)({ github, context });

      - name: Build book
        run: mdbook build rwkv-rs-book
